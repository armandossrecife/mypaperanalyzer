{% extends "base.html" %}

{% block title %}Cadastro - Paper Review AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">Criar Conta</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="Seu nome">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="******">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="******">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">Cadastrar</button>
                    </div>
                    <div class="text-center">
                        <p class="text-muted">Já tem uma conta? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none">Entrar</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
